spring:
  application:
    name: restaurant-management-api
  datasource:
    url: jdbc:postgresql://localhost:5433/restaurant_management_db
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration